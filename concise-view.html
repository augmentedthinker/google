<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Concise File</title>
    <style>
        body { font-family: sans-serif; padding: 40px; line-height: 1.6; max-width: 800px; margin: 0 auto; background: #f4f4f4; }
        pre { background: #eee; padding: 20px; border-radius: 5px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <nav style="background:#444; padding:15px; text-align:center; position:fixed; top:0; width:100%; left:0; z-index:1000; box-shadow:0 2px 5px rgba(0,0,0,0.3);">
        <a href="index.html" style="color:white; margin:0 15px; text-decoration:none; font-weight:bold;">Home</a>
        <a href="javascript:history.back()" style="color:white; margin:0 15px; text-decoration:none; font-weight:bold;">Back</a>
    </nav>
    <div style="margin-top:70px;"></div>
    <h1>Concise Version</h1>
    <pre id="content"></pre>
    <script>
        const params = new URLSearchParams(window.location.search);
        const file = params.get('file');
        document.getElementById('content').innerText = 'Loading ' + file + '...';
        fetch(file)
            .then(res => res.text())
            .then(text => document.getElementById('content').innerText = text);
    </script>
</body>
</html>
