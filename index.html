<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Repo</title>
    <style>
        body { margin: 0; background: #fff; color: #111; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; text-align: center; padding: 20px; }
        .hero-card { background: #eee; padding: 30px; border-radius: 15px; width: 100%; max-width: 600px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-top: 20px; margin-bottom: 20px; }
        h1 { margin: 0 0 10px; font-size: 2rem; color: #000; }
        p { color: #555; margin: 0; }
        .button-stack { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 600px; }
        .button { background: #ddd; color: #000; padding: 15px; text-decoration: none; border-radius: 10px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <div class="hero-card">
        <h1>Google Repo</h1>
        <p>Models: google/gemini-2.5-flash, google/gemini-2.5-pro, google/gemini-3.1-flash-lite-preview</p>
    </div>
    <div class="button-stack">
        <a href="#" class="button">Button 1</a>
        <a href="#" class="button">Button 2</a>
        <a href="#" class="button">Button 3</a>
        <a href="#" class="button">Button 4</a>
        <a href="#" class="button">Button 5</a>
    </div>
</body>
</html>
