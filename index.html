<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Repo</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; background-color: #333; color: white; font-family: sans-serif; line-height: 1.6; overflow-x: hidden; }
        .main-content { display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: calc(100vh - 70px); }
        .container { text-align: center; display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 700px; }
        .hero-card { 
            position: relative;
            background-image: url('art-background.png'); 
            background-size: cover; 
            background-position: center; 
            padding: 40px 20px; 
            border-radius: 15px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
            margin-bottom: 20px; 
            width: 100%; 
            min-height: 300px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .hero-overlay {
            background: rgba(0,0,0,0.6);
            padding: 20px;
            border-radius: 10px;
            width: 90%;
        }
        .hero-title { font-size: clamp(3rem, 10vw, 6rem); margin: 0 0 10px 0; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.8); }
        .hero-text { color: #fff; font-size: clamp(1rem, 3vw, 1.2rem); text-align: center; margin: 0 auto; max-width: 600px; text-shadow: 1px 1px 2px rgba(0,0,0,0.8); }
        .button { padding: 12px 20px; font-size: clamp(1rem, 3vw, 1.5rem); background-color: #4285f4; color: white; border: none; cursor: pointer; text-decoration: none; border-radius: 5px; width: 100%; max-width: 650px; margin: 8px 0; }
        .button-secondary { background-color: #555; }
        nav { background:#444; padding:15px; text-align:center; position:sticky; top:0; width:100%; z-index:1000; box-shadow:0 2px 5px rgba(0,0,0,0.3); }
        nav a { color:white; margin:0 10px; text-decoration:none; font-weight:bold; }

        @media (max-width: 600px) {
            .hero-card { padding: 15px; }
            .hero-text { text-align: left; }
        }
    </style>
</head>
<body>
    <nav style="background:#444; padding:15px; text-align:center; position:sticky; top:0; width:100%; z-index:1000; box-shadow:0 2px 5px rgba(0,0,0,0.3);">
        <a href="index.html" style="color:white; margin:0 15px; text-decoration:none; font-weight:bold;">Home</a>
        <a href="javascript:history.back()" style="color:white; margin:0 15px; text-decoration:none; font-weight:bold;">Back</a>
    </nav>
    <div class="main-content">
        <div class="container">
        <div class="hero-card">
            <div class="hero-overlay">
                <h1 class="hero-title">Google Repo</h1>
                <p class="hero-text">
                    This is our GitHub repo for focused experiments using the Google AI Studio Free Tier API. It keeps our artifacts, memories, and core workspace files organized around the Google model set we currently have available.
                </p>
            </div>
        </div>
        <a href="artifacts.html" class="button">Artifacts</a>
        <a href="core-files.html" class="button button-secondary">Core Markdown Files</a>
        <a href="memories.html" class="button button-secondary" style="background-color: #8e44ad;">Memories</a>
        <a href="readme.html" class="button button-secondary" style="background-color: #555;">README</a>
    </div>
</body>
</html>
