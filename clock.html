<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Clock</title>
    <style>
        body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: sans-serif; transition: background 0.5s; }
        h1 { font-size: 3rem; color: #fff; text-shadow: 1px 1px 2px #000; }
    </style>
</head>
<body>
    <h1 id="clock">00:00:00</h1>
    <script>
        function update() {
            const now = new Date();
            const time = now.toTimeString().split(' ')[0];
            document.getElementById('clock').textContent = time;
            const r = Math.floor(now.getHours() * 10);
            const g = Math.floor(now.getMinutes() * 4);
            const b = Math.floor(now.getSeconds() * 4);
            document.body.style.backgroundColor = `rgb(${r},${g},${b})`;
            requestAnimationFrame(update);
        }
        update();
    </script>
</body>
</html>
