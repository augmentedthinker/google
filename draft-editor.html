<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Draft Editor</title>
    <style>
        body { font-family: sans-serif; background-color: #222; color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        textarea { width: 80%; height: 60vh; margin-bottom: 20px; font-family: monospace; background: #333; color: #fff; padding: 10px; border: 1px solid #555; }
        .controls { display: flex; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-copy { background-color: #555; color: white; }
        .btn-download { background-color: #34a853; color: white; }
    </style>
</head>
<body>
<nav style="background:#444; padding:15px; text-align:center; position:fixed; top:0; width:100%; z-index:1000; box-shadow:0 2px 5px rgba(0,0,0,0.3);">
    <a href="index.html" style="color:white; margin:0 15px; text-decoration:none; font-weight:bold;">Home</a>
    <a href="javascript:history.back()" style="color:white; margin:0 15px; text-decoration:none; font-weight:bold;">Back</a>
</nav>
<div style="margin-top:70px;"></div>
    <h1 id="title">Draft Editor</h1>
    <textarea id="editor" placeholder="Paste your markdown here..."></textarea>
    <div class="controls">
        <button class="btn-copy" onclick="copyToClipboard()">Copy to Clipboard</button>
        <button class="btn-download" onclick="downloadFile()">Download as .md</button>
    </div>
    <script>
        // Set title based on URL parameters to know which file we are drafting
        const params = new URLSearchParams(window.location.search);
        const filename = params.get('file') || 'draft.md';
        document.getElementById('title').innerText = 'Drafting: ' + filename;

        function copyToClipboard() {
            const copyText = document.getElementById("editor");
            copyText.select();
            document.execCommand("copy");
            alert("Copied to clipboard!");
        }

        function downloadFile() {
            const text = document.getElementById("editor").value;
            const blob = new Blob([text], { type: "text/markdown" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
